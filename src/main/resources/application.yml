spring:
  application:
    name: portfolio-api

  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: adriannparanhos@gmail.com
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
portfolio:
  mail:
    recipient: adriannparanhos@gmail.com

server:
  port: 8080