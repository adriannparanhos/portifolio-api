version: '3.8'

services:
  postgres-portfolio:
    image: postgres:16-alpine
    container_name: postgres-portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - portfolio_pg_data:/var/lib/postgresql/data
    networks:
      - portfolio-network

volumes:
  portfolio_pg_data:

networks:
  portfolio-network:
    driver: bridge